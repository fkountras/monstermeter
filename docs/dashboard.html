<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MonsterMeter – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    html { background: #0d1318; height: 100%; }
    :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f14; min-height: 100%; font-family: 'Inter', sans-serif; color: #c8f0f0; padding: 1.5rem 1rem 5rem; }
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 0.5px solid #1e2d3a; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: #c8f0f0; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #1e2d3a; border: 1px solid #4dd9e0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #4dd9e0; overflow: hidden; flex-shrink: 0; }
    .logout-btn { font-size: 12px; color: #5a7080; background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; transition: color 0.2s; }
    .logout-btn:hover { color: #f09595; }
    .greeting { margin-bottom: 2rem; }
    .greeting h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: #c8f0f0; line-height: 1; }
    .greeting p { font-size: 13px; color: #5a7080; margin-top: 6px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #111820; border: 0.5px solid #1e2d3a; border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-label { font-size: 11px; color: #5a7080; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; color: #4dd9e0; line-height: 1; }
    .stat-sub { font-size: 11px; color: #5a7080; margin-top: 4px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: #c8f0f0; }
    .btn-primary { padding: 10px 20px; background: #4dd9e0; color: #0a0f14; border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1.5px; cursor: pointer; transition: background 0.2s; text-decoration: none; display: inline-block; }
    .btn-primary:hover { background: #c8f0f0; }
    .btn-ghost { font-size: 12px; color: #4dd9e0; background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
    .log-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .log-item { background: #111820; border: 0.5px solid #1e2d3a; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .log-icon { width: 36px; height: 36px; border-radius: 8px; background: #0a0f14; border: 0.5px solid #1e2d3a; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .log-info { flex: 1; min-width: 0; }
    .log-drink { font-size: 14px; font-weight: 500; color: #c8f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-meta { font-size: 12px; color: #5a7080; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-time { font-size: 11px; color: #5a7080; text-align: right; flex-shrink: 0; }
    .empty-state { background: #111820; border: 0.5px dashed #1e2d3a; border-radius: 12px; padding: 2rem; text-align: center; color: #5a7080; font-size: 13px; margin-bottom: 1.5rem; }
    .loading-text { color: #5a7080; font-size: 13px; padding: 1rem 0; }
    .error-msg { background: rgba(162,45,45,0.15); border: 0.5px solid #a32d2d; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #f09595; margin-bottom: 1rem; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1318; border-top: 0.5px solid #1e2d3a; display: flex; justify-content: space-around; padding: 0.6rem 0 calc(0.8rem + env(safe-area-inset-bottom)); z-index: 100; }
    .bottom-nav::after { content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: env(safe-area-inset-bottom); background: #0d1318; z-index: 99; }
    .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #5a7080; text-decoration: none; letter-spacing: 0.5px; transition: color 0.2s; }
    .bottom-nav a.active { color: #4dd9e0; }
    .bottom-nav .icon { font-size: 20px; }
    .desktop-nav { display: flex; gap: 1.5rem; align-items: center; }
    .desktop-nav a { font-size: 13px; color: #5a7080; text-decoration: none; letter-spacing: 0.5px; transition: color 0.2s; }
    .desktop-nav a:hover, .desktop-nav a.active { color: #4dd9e0; }
    @media (max-width: 600px) { .desktop-nav { display: none; } .greeting h1 { font-size: 28px; } .stat-value { font-size: 26px; } .stat-label { font-size: 10px; } .stat-card { padding: 0.75rem; } }
    @media (min-width: 601px) { .bottom-nav { display: none; } body { padding-bottom: 1.5rem; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="dashboard.html">MonsterMeter</a>
  <div class="desktop-nav">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="log.html">Log drink</a>
    <a href="friends.html">Friends</a>
    <a href="map.html">Map</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="profile.html">Profile</a>
  </div>
  <div class="nav-right">
    <div class="avatar" id="nav-avatar">--</div>
    <button class="logout-btn" onclick="handleLogout()">Sign out</button>
  </div>
</nav>
<div class="greeting">
  <h1 id="greeting-text">Welcome back!</h1>
  <p id="greeting-date"></p>
</div>
<div class="stats-grid">
  <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">--</div><div class="stat-sub">all time</div></div>
  <div class="stat-card"><div class="stat-label">Week</div><div class="stat-value" id="stat-week">--</div><div class="stat-sub">7 days</div></div>
  <div class="stat-card"><div class="stat-label">Friends</div><div class="stat-value" id="stat-friends">--</div><div class="stat-sub">connected</div></div>
</div>
<div class="section-header">
  <div class="section-title">Recent logs</div>
  <a class="btn-primary" href="log.html">+ Log</a>
</div>
<div id="log-list" class="log-list"><div class="loading-text">Loading...</div></div>
<div class="section-header">
  <div class="section-title">Friends activity</div>
  <button class="btn-ghost" onclick="window.location.href='friends.html'">See all →</button>
</div>
<div id="friends-activity" class="empty-state">Loading friends activity...</div>
<nav class="bottom-nav">
  <a href="dashboard.html" class="active"><span class="icon">🏠</span>Home</a>
  <a href="log.html"><span class="icon">🥤</span>Log</a>
  <a href="friends.html"><span class="icon">👥</span>Friends</a>
  <a href="leaderboard.html"><span class="icon">🏆</span>Ranks</a>
  <a href="profile.html"><span class="icon">👤</span>Profile</a>
</nav>
<script>
  const API_BASE = 'https://monstermeter-production.up.railway.app/api';
  const userId = localStorage.getItem('userId');
  const username = localStorage.getItem('username');
  if (!userId || !username) window.location.href = 'login.html';
  function initNavAvatar() {
  const pic = localStorage.getItem('profilePicture');
  const $nav = $('#nav-avatar');
  if (pic) {
    $nav.html(`<img src="${pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`);
  } else {
    $nav.text(username.substring(0, 2).toUpperCase());
    $.ajax({
      url: API_BASE + '/users/' + userId, method: 'GET',
      success: function(user) {
        if (user.profilePicture) {
          localStorage.setItem('profilePicture', user.profilePicture);
          $nav.html(`<img src="${user.profilePicture}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`);
        }
      }
    });
  }
}
initNavAvatar();
  $('#greeting-text').text('Welcome back, ' + username + ' 👋');
  const now = new Date();
  $('#greeting-date').text(now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }));
  function formatLogDate(dateStr) {
    const date = new Date(dateStr);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    const timeStr = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    if (date.toDateString() === today.toDateString()) return 'Today<br>' + timeStr;
    if (date.toDateString() === yesterday.toDateString()) return 'Yesterday<br>' + timeStr;
    return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }
  function loadLogs() {
    $.ajax({
      url: API_BASE + '/logs/user/' + userId, method: 'GET',
      success: function(logs) {
        const $list = $('#log-list'); $list.empty();
        $('#stat-total').text(logs.length);
        const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
        $('#stat-week').text(logs.filter(l => new Date(l.loggedAt) > oneWeekAgo).length);
        if (logs.length === 0) { $list.html('<div class="empty-state">No drinks logged yet — hit the button above to start tracking!</div>'); return; }
        logs.slice(0, 5).forEach(function(log) {
          const notes = log.notes || 'No notes';
          $list.append(`<div class="log-item"><div class="log-icon">🥤</div><div class="log-info"><div class="log-drink">${log.drinkName}</div><div class="log-meta">${notes}</div></div><div class="log-time">${formatLogDate(log.loggedAt)}</div></div>`);
        });
      },
      error: function() { $('#log-list').html('<div class="error-msg">Could not load logs.</div>'); $('#stat-total').text('--'); $('#stat-week').text('--'); }
    });
  }
  function loadFriends() {
    $.ajax({
      url: API_BASE + '/friendships/friends/' + userId, method: 'GET',
      success: function(friends) {
        $('#stat-friends').text(friends.length);
        if (friends.length === 0) $('#friends-activity').text('No friends added yet — invite someone to compare stats!');
        else $('#friends-activity').text(friends.length + ' friend(s) connected. Visit the Friends page to see their stats.');
      },
      error: function() { $('#stat-friends').text('--'); $('#friends-activity').text('Could not load friends data.'); }
    });
  }
  function handleLogout() { 
  localStorage.removeItem('userId'); 
  localStorage.removeItem('username'); 
  localStorage.removeItem('profilePicture');
  window.location.href = 'login.html'; 
}
  loadLogs(); loadFriends();
</script>
</body>
</html>
